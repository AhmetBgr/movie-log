<!DOCTYPE html>
<html>
<head>
    <title>Watchlist API</title>
</head>
<body>
    <script>
        // Simple API endpoint for watchlist operations
        class WatchlistAPI {
            static getWatchlist() {
                const data = localStorage.getItem('my_movie_list');
                return data ? JSON.parse(data) : [];
            }
            
            static saveWatchlist(watchlist) {
                localStorage.setItem('my_movie_list', JSON.stringify(watchlist));
                return { success: true };
            }
            
            static findMovie(imdbId) {
                const watchlist = this.getWatchlist();
                return watchlist.find(m => m.ImdbId === imdbId);
            }
        }

        // Handle API requests
        async function handleRequest() {
            const url = new URL(window.location.href);
            const path = url.pathname;
            const pathParts = path.split('/').filter(p => p);
            
            try {
                if (pathParts[0] === 'api' && pathParts[1] === 'watchlist') {
                    const action = pathParts[2];
                    
                    if (action === 'check' && pathParts[3]) {
                        // Check if movie exists
                        const imdbId = pathParts[3];
                        const movie = WatchlistAPI.findMovie(imdbId);
                        
                        return new Response(JSON.stringify({
                            exists: !!movie,
                            isInWatchlist: !!movie,
                            item: movie
                        }), {
                            headers: { 'Content-Type': 'application/json' }
                        });
                    }
                    
                    if (action === 'add') {
                        // Add movie
                        const newItem = await request.json();
                        const watchlist = WatchlistAPI.getWatchlist();
                        
                        // Check if already exists
                        const existing = watchlist.find(m => m.ImdbId === newItem.ImdbId);
                        if (existing) {
                            return new Response(JSON.stringify({
                                success: false,
                                message: "Movie already in watchlist"
                            }), {
                                headers: { 'Content-Type': 'application/json' }
                            });
                        }
                        
                        watchlist.push(newItem);
                        WatchlistAPI.saveWatchlist(watchlist);
                        
                        return new Response(JSON.stringify({
                            success: true,
                            message: "Movie added to watchlist",
                            item: newItem
                        }), {
                            headers: { 'Content-Type': 'application/json' }
                        });
                    }
                    
                    if (action === 'remove') {
                        // Remove movie
                        const requestData = await request.json();
                        const watchlist = WatchlistAPI.getWatchlist();
                        
                        const index = watchlist.findIndex(m => m.ImdbId === requestData.ImdbId);
                        if (index === -1) {
                            return new Response(JSON.stringify({
                                success: false,
                                message: "Movie not found in watchlist"
                            }), {
                                headers: { 'Content-Type': 'application/json' }
                            });
                        }
                        
                        watchlist.splice(index, 1);
                        WatchlistAPI.saveWatchlist(watchlist);
                        
                        return new Response(JSON.stringify({
                            success: true,
                            message: "Movie removed from watchlist"
                        }), {
                            headers: { 'Content-Type': 'application/json' }
                        });
                    }
                }
            } catch (error) {
                return new Response(JSON.stringify({
                    error: "Internal server error",
                    message: error.message
                }), {
                    status: 500,
                    headers: { 'Content-Type': 'application/json' }
                });
            }
            
            // Return 404 for other paths
            return new Response('Not Found', { status: 404 });
        }

        // Mock fetch API for this simple implementation
        const request = {
            json: async () => {
                return new Promise(resolve => {
                    // In a real implementation, this would parse the request body
                    // For now, we'll return a dummy object
                    resolve({});
                });
            }
        };

        // Export for testing
        window.WatchlistAPI = WatchlistAPI;
    </script>
</body>
</html>
