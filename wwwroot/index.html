<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Log</title>
    <script>
        var isGithubPages = window.location.hostname.includes("github.io");
        var basePath = isGithubPages ? "/movie-log/" : "/";
        var baseElement = document.createElement('base');
        baseElement.href = basePath;
        document.head.appendChild(baseElement);
    </script>
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="MyPrivateWatchlist.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
</head>

<body>
    <script>
        window.localStorageFunctions = {
            setItem: function (key, value) {
                localStorage.setItem(key, value);
            },
            getItem: function (key) {
                return localStorage.getItem(key);
            },
            removeItem: function (key) {
                localStorage.removeItem(key);
            },
            getAllItems: function () {
                var items = {};
                for (var i = 0; i < localStorage.length; i++) {
                    var key = localStorage.key(i);
                    items[key] = localStorage.getItem(key);
                }
                return JSON.stringify(items);
            },
            setAllItems: function (json) {
                var items = JSON.parse(json);
                localStorage.clear();
                for (var key in items) {
                    localStorage.setItem(key, items[key]);
                }
            }
        };
        window.uiHelpers = {
            isDesktop: function () {
                return window.innerWidth >= 768;
            },
            isMobile: function () {
                return window.innerWidth < 768;
            },
            historyBack: function () {
                history.back();
            },
            confirm: function (msg) {
                return window.confirm(msg);
            },
            downloadFile: function (filename, content) {
                var blob = new Blob([content], { type: 'application/json' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        };
        window.openOnMenu = {
            _initialized: false,
            init: function () {
                if (this._initialized) return;
                this._initialized = true;
                var self = this;

                document.addEventListener("click", function (e) {
                    document.querySelectorAll("details.open-on-menu[open]").forEach(function (menu) {
                        if (!menu.contains(e.target)) {
                            menu.removeAttribute("open");
                        }
                    });
                }, true);

                document.addEventListener("toggle", function (e) {
                    var menu = e.target;
                    if (!menu || !menu.matches || !menu.matches("details.open-on-menu")) return;
                    var popover = menu.querySelector(".open-on-popover");
                    if (menu.open) {
                        if (popover) {
                            popover.removeAttribute("data-positioned");
                        }
                        requestAnimationFrame(function () { self.position(menu); });
                    }
                    else if (popover) {
                        popover.removeAttribute("data-positioned");
                    }
                }, true);

                window.addEventListener("resize", function () {
                    self.closeAll();
                });

                document.addEventListener("scroll", function () {
                    self.closeAll();
                }, true);
            },
            closeClosest: function (el) {
                if (!el || !el.closest) return;
                var menu = el.closest("details.open-on-menu");
                if (menu) {
                    menu.removeAttribute("open");
                }
            },
            closeAll: function () {
                document.querySelectorAll("details.open-on-menu[open]").forEach(function (menu) {
                    menu.removeAttribute("open");
                });
            },
            position: function (menu) {
                if (!menu) return;
                var trigger = menu.querySelector(".open-on-trigger");
                var popover = menu.querySelector(".open-on-popover");
                if (!trigger || !popover) return;

                popover.style.left = "0px";
                popover.style.top = "0px";

                var rect = trigger.getBoundingClientRect();
                var popRect = popover.getBoundingClientRect();
                var gutter = 8;
                var left = Math.min(Math.max(gutter, rect.right - popRect.width), window.innerWidth - popRect.width - gutter);
                var top = rect.bottom + 6;

                if (top + popRect.height > window.innerHeight - gutter) {
                    top = Math.max(gutter, rect.top - popRect.height - 6);
                }

                // Check for transformed parent (like SidePanel)
                var parent = menu.parentElement;
                while (parent && parent !== document.body) {
                    var style = window.getComputedStyle(parent);
                    if (style.transform !== "none" || style.perspective !== "none" || style.filter !== "none") {
                        var pRect = parent.getBoundingClientRect();
                        left -= pRect.left;
                        top -= pRect.top;
                        break;
                    }
                    parent = parent.parentElement;
                }

                popover.style.left = left + "px";
                popover.style.top = top + "px";
                popover.setAttribute("data-positioned", "true");
            }
        };

        window.holdSelect = {
            _timer: null,
            _dotnet: null,
            _initialized: false,
            _startX: 0,
            _startY: 0,
            _targetRowId: null,
            _holdFired: false,
            _suppressClickUntil: 0,
            _suppressClickRowId: null,
            _holdMs: 300,
            _moveThresholdPx: 10,
            _interactiveSelector: "a,button,input,select,textarea,label,[contenteditable='true']",
            _resolveHoldId: function (target) {
                if (!target || !target.closest) return null;
                var hit = target.closest("[data-holdselect-id], tr[data-imdbid]");
                if (!hit) return null;
                return hit.getAttribute("data-holdselect-id") || hit.getAttribute("data-imdbid");
            },
            _clearTimer: function () {
                if (this._timer) {
                    clearTimeout(this._timer);
                    this._timer = null;
                }
            },
            _cancel: function () {
                this._clearTimer();
                this._targetRowId = null;
            },
            _scheduleHold: function (rowId) {
                var self = this;
                this._clearTimer();
                this._targetRowId = rowId;
                this._holdFired = false;
                this._timer = setTimeout(function () {
                    self._timer = null;
                    self._holdFired = true;
                    self._suppressClickUntil = Date.now() + 700;
                    self._suppressClickRowId = self._targetRowId;
                    if (self._dotnet && self._targetRowId) {
                        self._dotnet.invokeMethodAsync("OnHoldSelect", self._targetRowId).catch(function () { });
                    }
                }, this._holdMs);
            },
            init: function (dotnetRef) {
                this._dotnet = dotnetRef;
                if (this._initialized) return;
                this._initialized = true;
                var self = this;

                document.addEventListener("pointerdown", function (e) {
                    if (e.button !== 0) return;
                    if (!e.target) return;
                    if (e.target.closest(self._interactiveSelector)) return;
                    var holdId = self._resolveHoldId(e.target);
                    if (!holdId) return;

                    self._startX = e.clientX;
                    self._startY = e.clientY;
                    self._scheduleHold(holdId);
                }, { passive: true });

                document.addEventListener("pointermove", function (e) {
                    if (!self._timer) return;
                    var dx = Math.abs(e.clientX - self._startX);
                    var dy = Math.abs(e.clientY - self._startY);
                    if (dx > self._moveThresholdPx || dy > self._moveThresholdPx) {
                        self._cancel();
                    }
                }, { passive: true });

                document.addEventListener("pointerup", function () {
                    self._cancel();
                }, { passive: true });

                document.addEventListener("pointercancel", function () {
                    self._cancel();
                }, { passive: true });

                document.addEventListener("contextmenu", function (e) {
                    if (!self._holdFired) return;
                    var holdId = self._resolveHoldId(e.target);
                    if (holdId && holdId === self._targetRowId) {
                        e.preventDefault();
                    }
                });

                document.addEventListener("click", function (e) {
                    if (Date.now() > self._suppressClickUntil) return;
                    var holdId = self._resolveHoldId(e.target);
                    if (!holdId || holdId !== self._suppressClickRowId) return;
                    e.preventDefault();
                    e.stopPropagation();
                }, true);
            }
        };
    </script>

    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        (function () {
            const redirect = sessionStorage.redirect;
            if (redirect) {
                history.replaceState(null, null, redirect);
                sessionStorage.removeItem("redirect");
            }
        })();
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' }).then(registration => {
                registration.onupdatefound = () => {
                    const installingWorker = registration.installing;
                    if (installingWorker == null) return;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed') {
                            if (navigator.serviceWorker.controller) {
                                // New version available — notify Blazor to show update banner
                                window._swUpdateReady = true;
                                if (window._blazorUpdateCallback) {
                                    window._blazorUpdateCallback();
                                }
                            }
                        }
                    };
                };
            });
        }

        window.registerUpdateCallback = function (dotnetRef) {
            window._blazorUpdateCallback = () => dotnetRef.invokeMethodAsync('OnUpdateAvailable');
            // Fire immediately if SW already signalled before Blazor loaded
            if (window._swUpdateReady) window._blazorUpdateCallback();
        };

        window.applyUpdate = function () {
            window.location.reload();
        };
    </script>
</body>

</html>
